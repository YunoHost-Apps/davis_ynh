#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "davis"
name = "Davis"
description.en = "Lightweight CalDAV and CardDAV server"
description.fr = "Serveur CalDAV et CardDAV léger"

version = "5.4.3~ynh2"

maintainers = ["eric_G"]

[upstream]
license = "MIT"
code = "https://github.com/tchapi/davis"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = "all"
multi_instance = true

ldap = false
sso = false

disk = "200M"
ram.build = "200M"
ram.runtime = "100M"

[install]
    [install.domain]
    type = "domain"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

    [install.admin]
    type = "user"

    [install.password]
    type = "password"

[resources]

    [resources.sources]

    [resources.sources.main]
    url = "https://github.com/tchapi/davis/archive/refs/tags/v5.4.3.tar.gz"
    sha256 = "5421b33e33f1bfed49a2252b02c60566b56d7c8b934917b681609c96ea0115c2"

    autoupdate.strategy = "latest_github_tag"

    [resources.system_user]
    allow_email = true

    [resources.install_dir]
    group = "www-data:r-x"
    
    [resources.permissions]
    main.url = "/"

    [resources.apt]
    packages = "postgresql, php8.5-intl, php8.5-gd, php8.5-pgsql, php8.5-ldap, php8.5-curl, php8.5-dom, php8.5-xml, php8.5-zip"

    [resources.database]
    type = "postgresql"

    [resources.composer]
    version = "2.10.1"
